<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translation Machine 3000</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#4A3B6B;            /* soft plum ink */
  --cream:#FFFDF6;
  --sky1:#BFE7FF; --sky2:#E3D9FF; --sky3:#FFE1D6;
  --pink:#FF9EBB; --coral:#FF8A80; --gold:#F7C948; --mint:#7FE3C3; --blue:#8AC9FF; --lav:#C9B8F5;
  --card-shadow:0 10px 24px rgba(90,70,140,.18), 0 3px 0 rgba(90,70,140,.12);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Nunito',system-ui,sans-serif; color:var(--ink);
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:12px 12px 100px; overflow-x:hidden;
  user-select:none; -webkit-user-select:none;
  background:linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 55%, var(--sky3) 100%);
  background-attachment:fixed;
}
h1,h2,h3,.display{font-family:'Baloo 2','Fredoka',system-ui,sans-serif;}

/* ---- dreamy sky ---- */
.cloud{position:fixed; background:rgba(255,255,255,.75); border-radius:999px; filter:blur(6px); z-index:0; pointer-events:none;}
.cloud.c1{width:220px;height:70px; top:8%; left:-60px; animation:drift 70s linear infinite;}
.cloud.c2{width:160px;height:52px; top:30%; right:-40px; animation:drift 90s linear infinite reverse;}
.cloud.c3{width:260px;height:80px; bottom:12%; left:10%; animation:drift 110s linear infinite;}
@keyframes drift{from{transform:translateX(-15vw)}to{transform:translateX(115vw)}}
.spark{position:fixed; z-index:0; pointer-events:none; animation:floatup 5s ease-in forwards; opacity:.9;}
@keyframes floatup{from{transform:translateY(0) scale(1); opacity:.9}to{transform:translateY(-30vh) scale(.4); opacity:0}}

.wrap{width:100%; max-width:520px; display:flex; flex-direction:column; gap:14px; position:relative; z-index:1;}

/* ===== COMPANION MACHINE ===== */
.machine{
  background:linear-gradient(180deg,#FFFFFF 0%, var(--cream) 100%);
  border:3px solid rgba(74,59,107,.25); border-radius:34px;
  box-shadow:var(--card-shadow); padding:14px 18px 12px; position:relative;
  animation:bob 3.5s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.sprout{position:absolute; top:-30px; left:50%; transform:translateX(-50%); width:5px; height:26px; background:var(--mint); border-radius:3px;}
.sprout::before{content:""; position:absolute; top:2px; left:-11px; width:14px; height:9px; background:var(--mint); border-radius:50% 50% 50% 0; transform:rotate(-30deg);}
.orb{position:absolute; top:-52px; left:50%; width:20px; height:20px; margin-left:-10px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #fff, var(--gold) 60%);
  box-shadow:0 0 14px 4px rgba(247,201,72,.7);
  animation:orbfloat 2.6s ease-in-out infinite;}
@keyframes orbfloat{0%,100%{transform:translate(-4px,0)}50%{transform:translate(6px,-7px)}}
.face{display:flex; justify-content:center; gap:30px; padding:8px 0 0; position:relative;}
.eye{width:50px; height:50px; background:#fff; border:3px solid var(--ink); border-radius:50%;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
  box-shadow:inset 0 -6px 0 rgba(138,201,255,.35);}
.pupil{width:24px; height:24px; background:var(--ink); border-radius:50%; position:relative; transition:all .25s;}
.pupil::after{content:""; position:absolute; top:3px; left:4px; width:8px; height:8px; background:#fff; border-radius:50%;}
.cheeks{display:flex; justify-content:center; gap:96px; margin-top:-10px;}
.cheek{width:18px; height:10px; background:var(--pink); border-radius:50%; opacity:.7;}
.machine[data-mood="idle"] .pupil{animation:blink 4.5s infinite;}
@keyframes blink{0%,92%{transform:scaleY(1)}95%{transform:scaleY(.08)}98%,100%{transform:scaleY(1)}}
.machine[data-mood="think"] .pupil{animation:spin .7s linear infinite; background:var(--blue); border-radius:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.machine[data-mood="happy"] .pupil{width:28px; height:14px; border-radius:0 0 28px 28px; transform:translateY(-5px);}
.machine[data-mood="happy"] .pupil::after{display:none;}
.machine[data-mood="happy"] .eye{background:#FFF3D6;}
.machine[data-mood="dizzy"] .pupil{background:transparent; border-radius:0;}
.machine[data-mood="dizzy"] .pupil::after{display:none;}
.machine[data-mood="dizzy"] .pupil::before{content:"✖"; font-size:24px; color:var(--coral); line-height:24px; display:block;}
.machine[data-mood="dizzy"]{animation:wobble .5s ease 3;}
@keyframes wobble{25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
.titlebar{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:6px;}
.mtitle{font-family:'Baloo 2'; font-weight:800; font-size:16px; letter-spacing:.5px;
  background:linear-gradient(90deg,var(--coral),var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.lvl{font-size:11px; font-weight:800; color:#9A8CC7;}
.langchip{
  font-family:'Fredoka'; font-weight:600; font-size:14px; color:var(--ink);
  background:linear-gradient(180deg,#fff,#EAF4FF);
  border:2px solid rgba(74,59,107,.3); border-radius:999px; padding:7px 13px;
  box-shadow:0 3px 8px rgba(90,70,140,.2); cursor:pointer;
}
.langchip:active{transform:scale(.94);}

/* ===== STAGE ===== */
.stage{
  background:linear-gradient(180deg,#FFFFFF 0%, var(--cream) 100%);
  border:3px solid rgba(74,59,107,.22); border-radius:34px;
  box-shadow:var(--card-shadow); padding:22px 18px; min-height:320px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px;
  text-align:center; position:relative; overflow:hidden;
}
.stage::before{content:"✦"; position:absolute; top:12px; left:16px; color:var(--lav); font-size:14px; opacity:.8;}
.stage::after{content:"✦"; position:absolute; top:12px; right:16px; color:var(--lav); font-size:14px; opacity:.8;}
.bigemoji{font-size:64px; line-height:1; filter:drop-shadow(0 4px 6px rgba(90,70,140,.25));}
.stage h2{margin:0; font-size:26px; font-weight:800;}
.stage p{margin:0; font-size:17px; font-weight:800; line-height:1.5;}
.divider{color:var(--gold); font-size:13px; letter-spacing:6px;}
.native{font-family:'Baloo 2'; font-size:42px; font-weight:800; margin:2px 0;}
.roman{font-size:20px; font-weight:800; color:var(--coral); letter-spacing:.5px;}
.gloss{font-size:15px; color:#9A8CC7; font-weight:800;}
.tag{
  font-family:'Baloo 2'; font-size:13px; font-weight:800; letter-spacing:1.5px; color:#7A5A00;
  background:linear-gradient(180deg,#FFE9A8,var(--gold));
  border:2px solid rgba(122,90,0,.35); border-radius:999px; padding:5px 16px;
  box-shadow:0 3px 8px rgba(247,201,72,.5);
}

/* ===== BUTTONS ===== */
.btn{
  font-family:'Baloo 2'; font-weight:800; font-size:20px; color:#fff;
  background:linear-gradient(180deg,var(--pink),var(--coral));
  border:none; border-radius:999px;
  padding:16px 24px; width:100%; cursor:pointer; position:relative; overflow:hidden;
  box-shadow:0 5px 0 rgba(190,80,90,.55), 0 10px 18px rgba(255,138,128,.4);
  text-shadow:0 1px 2px rgba(0,0,0,.15);
  transition:transform .08s;
}
.btn::before{content:""; position:absolute; top:4px; left:8%; width:84%; height:38%;
  background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,0)); border-radius:999px; pointer-events:none;}
.btn:active{transform:translateY(4px) scale(.98); box-shadow:0 1px 0 rgba(190,80,90,.55);}
.btn.mint{background:linear-gradient(180deg,#A9F0D8,var(--mint)); color:#1E6B52; text-shadow:none;
  box-shadow:0 5px 0 rgba(60,150,120,.5), 0 10px 18px rgba(127,227,195,.45);}
.btn.mint:active{box-shadow:0 1px 0 rgba(60,150,120,.5);}
.btn.sky{background:linear-gradient(180deg,#BFE0FF,var(--blue)); color:#1E4E7A; text-shadow:none;
  box-shadow:0 5px 0 rgba(70,130,190,.5), 0 10px 18px rgba(138,201,255,.45);}
.btn.sky:active{box-shadow:0 1px 0 rgba(70,130,190,.5);}
.btn.gold{background:linear-gradient(180deg,#FFE9A8,var(--gold)); color:#7A5A00; text-shadow:none;
  box-shadow:0 5px 0 rgba(180,140,20,.5), 0 10px 18px rgba(247,201,72,.5);}
.btn.gold:active{box-shadow:0 1px 0 rgba(180,140,20,.5);}
.btn.small{width:auto; font-size:16px; padding:11px 18px;}
.btnrow{display:flex; gap:10px; width:100%; justify-content:center; flex-wrap:wrap;}

/* Hold button */
.holdbtn{background:linear-gradient(180deg,var(--pink),var(--coral));}
.holdfill{position:absolute; inset:0; width:0%; background:rgba(255,255,255,.5);}
.holdlabel{position:relative; z-index:1;}
.bars{display:flex; gap:5px; justify-content:center; align-items:flex-end; height:34px;}
.bars i{width:8px; background:linear-gradient(180deg,var(--mint),#4FC9A4); border-radius:4px; animation:bar .5s infinite alternate; box-shadow:0 2px 4px rgba(60,150,120,.4);}
.bars i:nth-child(2){animation-delay:.1s}.bars i:nth-child(3){animation-delay:.2s}
.bars i:nth-child(4){animation-delay:.3s}.bars i:nth-child(5){animation-delay:.15s}
@keyframes bar{from{height:8px}to{height:32px}}

/* ===== TABS ===== */
.tabbar{
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  width:calc(100% - 24px); max-width:520px; display:flex; gap:6px;
  background:rgba(255,253,246,.9); backdrop-filter:blur(8px);
  border:3px solid rgba(74,59,107,.22); border-radius:999px;
  padding:8px; z-index:50; box-shadow:0 10px 24px rgba(90,70,140,.28);
}
.tab{
  flex:1; font-family:'Baloo 2'; font-weight:800; font-size:13px; color:#9A8CC7;
  background:transparent; border:none; border-radius:999px;
  padding:8px 4px; cursor:pointer; text-align:center;
}
.tab .ticon{display:block; font-size:24px; filter:grayscale(.4) opacity(.75);}
.tab.active{background:linear-gradient(180deg,#FFE9A8,var(--gold)); color:#7A5A00; box-shadow:0 3px 8px rgba(247,201,72,.55);}
.tab.active .ticon{filter:none;}

/* ===== COLLECTION ===== */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:10px; width:100%;}
.card{border:2px solid rgba(74,59,107,.22); border-radius:20px; padding:12px 6px 10px; text-align:center;
  box-shadow:0 6px 14px rgba(90,70,140,.18); position:relative;}
.card::before{content:"⭐"; position:absolute; top:6px; right:8px; font-size:11px;}
.card.r0{background:linear-gradient(160deg,#FFF3F6,#FFDCE7);}
.card.r1{background:linear-gradient(160deg,#F0FBFF,#D6EEFF);}
.card.r2{background:linear-gradient(160deg,#F2FFF9,#D8F7EA);}
.card.r3{background:linear-gradient(160deg,#FFFBEE,#FFEFC2);}
.card .ce{font-size:38px; filter:drop-shadow(0 3px 4px rgba(90,70,140,.25));}
.card .cn{font-family:'Baloo 2'; font-size:12px; font-weight:800; line-height:1.2; margin-top:2px;}
.card .cw{font-size:10px; font-weight:800; color:#9A8CC7;}
.pbrow{background:linear-gradient(180deg,#fff,#FBF7FF); border:2px solid rgba(74,59,107,.2); border-radius:20px;
  padding:10px 12px; display:flex; align-items:center; gap:10px; width:100%; box-shadow:0 5px 12px rgba(90,70,140,.15);}
.pbrow .pe{font-size:26px;}
.pbrow .pt{flex:1; text-align:left;}
.pbrow .pn{font-family:'Baloo 2'; font-weight:800; font-size:16px;}
.pbrow .pr{font-size:13px; color:var(--coral); font-weight:800;}
.pbrow .pg{font-size:12px; color:#9A8CC7; font-weight:800;}
.speak{font-size:20px; background:linear-gradient(180deg,#BFE0FF,var(--blue));
  border:none; border-radius:14px; padding:7px 10px; cursor:pointer;
  box-shadow:0 3px 0 rgba(70,130,190,.5);}
.speak:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(70,130,190,.5);}
.meter{width:100%; background:#fff; border:2px solid rgba(74,59,107,.25); border-radius:999px; height:20px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(90,70,140,.15); position:relative;}
.meter i{display:block; height:100%; background:linear-gradient(90deg,var(--gold),#FFB86B); transition:width .5s; border-radius:999px;}
.meter::after{content:"💎"; position:absolute; right:4px; top:50%; transform:translateY(-58%); font-size:13px;}

/* ===== OVERLAYS ===== */
.overlay{
  position:fixed; inset:0; background:rgba(120,100,180,.4); backdrop-filter:blur(5px); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:16px;
}
.omodal{
  background:linear-gradient(180deg,#FFFFFF,var(--cream));
  border:3px solid rgba(74,59,107,.25); border-radius:36px;
  box-shadow:0 16px 40px rgba(90,70,140,.4); padding:26px 20px; max-width:440px; width:100%;
  text-align:center; display:flex; flex-direction:column; gap:14px; align-items:center;
  animation:pop .35s cubic-bezier(.2,1.6,.4,1);
}
@keyframes pop{from{transform:scale(.6); opacity:0}}
.omodal h2{margin:0; font-size:26px;}
.omodal p{margin:0; font-weight:800; line-height:1.5;}
.omodal.alarm{background:linear-gradient(180deg,#FF9EBB,#FF8A80); color:#fff; animation:pop .35s cubic-bezier(.2,1.6,.4,1), alarmflash 1s infinite;}
@keyframes alarmflash{50%{filter:brightness(.9)}}
.countdown{font-family:'Baloo 2'; font-size:76px; font-weight:800; line-height:1; text-shadow:0 4px 0 rgba(0,0,0,.12);}
.shake{animation:shakescreen .5s;}
@keyframes shakescreen{0%,100%{transform:translate(0)}20%{transform:translate(-8px,4px)}40%{transform:translate(8px,-4px)}60%{transform:translate(-6px,-4px)}80%{transform:translate(6px,4px)}}
.egg{font-size:96px; animation:eggwiggle .6s infinite; cursor:pointer; filter:drop-shadow(0 6px 8px rgba(90,70,140,.3));}
@keyframes eggwiggle{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.confetti{position:fixed; top:-40px; font-size:24px; z-index:200; animation:fall linear forwards; pointer-events:none;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
.score{font-family:'Baloo 2'; font-size:66px; font-weight:800; line-height:1;
  background:linear-gradient(180deg,var(--mint),#3FBF98); -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 3px 0 rgba(60,150,120,.3));}

.langpick{display:flex; flex-direction:column; gap:12px; width:100%;}
input[type=text]{
  width:100%; font-family:'Nunito'; font-weight:800; font-size:18px; color:var(--ink);
  border:3px solid rgba(74,59,107,.3); border-radius:999px; padding:14px 18px;
  background:#fff; box-shadow:inset 0 2px 6px rgba(90,70,140,.12); outline:none;
  user-select:text; -webkit-user-select:text;
}
input[type=text]:focus{border-color:var(--blue);}
.hidden{display:none !important;}
@media (prefers-reduced-motion: reduce){
  *{animation:none !important; transition:none !important;}
}
</style>
</head>
<body>

<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>

<div class="wrap">
  <!-- COMPANION -->
  <div class="machine" data-mood="idle" id="machine">
    <div class="sprout"></div><div class="orb"></div>
    <div class="face">
      <div class="eye"><div class="pupil"></div></div>
      <div class="eye"><div class="pupil"></div></div>
    </div>
    <div class="cheeks"><div class="cheek"></div><div class="cheek"></div></div>
    <div class="titlebar">
      <div>
        <div class="mtitle" id="machineTitle">RUSTY BUCKET 3000</div>
        <div class="lvl" id="machineLvl">LEVEL 1 MACHINE</div>
      </div>
      <button class="langchip" id="langChip">🇰🇷 Korean</button>
    </div>
  </div>

  <!-- STAGE -->
  <div class="stage" id="stage"></div>
</div>

<!-- TABS -->
<div class="tabbar">
  <button class="tab active" data-tab="missions"><span class="ticon">🗺️</span>Quests</button>
  <button class="tab" data-tab="translate"><span class="ticon">🗣️</span>Translate</button>
  <button class="tab" data-tab="collection"><span class="ticon">🏆</span>Collection</button>
</div>

<div id="overlayRoot"></div>

<script>
/* =====================================================
   TRANSLATION MACHINE 3000 — pastel adventure edition
   ===================================================== */

/* ---------- WORD BANK ---------- */
const WORDS = [
 {id:"fart",en:"fart",e:"💨",ko:"방귀",kr:"bang-gwi",zh:"放屁",zp:"fàng pì"},
 {id:"booger",en:"booger",e:"🤧",ko:"코딱지",kr:"ko-ttak-ji",zh:"鼻屎",zp:"bí shǐ"},
 {id:"puppy",en:"puppy",e:"🐶",ko:"강아지",kr:"gang-a-ji",zh:"小狗",zp:"xiǎo gǒu"},
 {id:"cat",en:"cat",e:"🐱",ko:"고양이",kr:"go-yang-i",zh:"猫",zp:"māo"},
 {id:"stinky",en:"so stinky!",e:"🦨",ko:"냄새나!",kr:"naem-sae-na",zh:"好臭!",zp:"hǎo chòu"},

 {id:"poop",en:"poop",e:"💩",ko:"똥",kr:"ttong",zh:"便便",zp:"biàn biàn"},
 {id:"monkey",en:"monkey",e:"🐵",ko:"원숭이",kr:"won-sung-i",zh:"猴子",zp:"hóu zi"},
 {id:"iloveyou",en:"I love you",e:"❤️",ko:"사랑해",kr:"sa-rang-hae",zh:"我爱你",zp:"wǒ ài nǐ"},
 {id:"grandma",en:"grandma",e:"👵",ko:"할머니",kr:"hal-meo-ni",zh:"奶奶",zp:"nǎi nai"},
 {id:"grandpa",en:"grandpa",e:"👴",ko:"할아버지",kr:"ha-ra-beo-ji",zh:"爷爷",zp:"yé ye"},
 {id:"hello",en:"hello",e:"👋",ko:"안녕하세요",kr:"an-nyeong-ha-se-yo",zh:"你好",zp:"nǐ hǎo"},
 {id:"yummy",en:"it's delicious!",e:"😋",ko:"맛있어!",kr:"ma-si-sseo",zh:"好吃!",zp:"hǎo chī"},
 {id:"hungry",en:"I'm hungry",e:"🍽️",ko:"배고파",kr:"bae-go-pa",zh:"我饿了",zp:"wǒ è le"},
 {id:"nose",en:"nose",e:"👃",ko:"코",kr:"ko",zh:"鼻子",zp:"bí zi"},
 {id:"dance",en:"dance",e:"💃",ko:"춤",kr:"chum",zh:"跳舞",zp:"tiào wǔ"},
 {id:"best",en:"the best!",e:"👍",ko:"최고!",kr:"choe-go",zh:"最棒!",zp:"zuì bàng"},
 {id:"hurry",en:"hurry hurry!",e:"🏃",ko:"빨리빨리!",kr:"ppal-li-ppal-li",zh:"快快!",zp:"kuài kuài"},
 {id:"chicken",en:"chicken",e:"🐔",ko:"닭",kr:"dak",zh:"鸡",zp:"jī"},
 {id:"melon",en:"watermelon",e:"🍉",ko:"수박",kr:"su-bak",zh:"西瓜",zp:"xī guā"},
 {id:"frog",en:"frog",e:"🐸",ko:"개구리",kr:"gae-gu-ri",zh:"青蛙",zp:"qīng wā"},
 {id:"sleepy",en:"I'm sleepy",e:"😴",ko:"졸려",kr:"jol-lyeo",zh:"好困",zp:"hǎo kùn"},
 {id:"thanks",en:"thank you",e:"🙏",ko:"감사합니다",kr:"gam-sa-ham-ni-da",zh:"谢谢",zp:"xiè xie"}
];

/* ---------- QUEST TEMPLATES ---------- */
const MISSIONS = [
 {t:"📢 REPEAT AFTER ME", txt:(w,L)=>`Tap 🔊 to hear <b>${w.en}</b> in ${L.name}. Grown-ups coach! Everyone say it <b>3 times</b>, LOUDER each time!`},
 {t:"🤫 SECRET WHISPER CHAIN", txt:(w,L)=>`Whisper the word around the circle, person to person. The LAST person <b>SHOUTS IT!</b>`},
 {t:"🎭 ACT IT OUT", txt:(w,L)=>`One kid acts out <b>${w.en}</b> with NO words! When a grown-up guesses it, EVERYONE says it in ${L.name} together!`},
 {t:"🐜 TINY... 🦖 GIANT!", txt:(w,L)=>`Say the word in your <b>tiniest mouse voice</b>... now your <b>BIGGEST DINOSAUR VOICE!</b>`},
 {t:"⚡ SPEED ROUND", txt:(w,L)=>`Everyone say it <b>5 times super fast</b> without laughing. (This is impossible. Try anyway.)`},
 {t:"🧒 KID EXPERTS", txt:(w,L)=>`Kids: teach the grown-ups your <b>silliest dance move</b>. Grown-ups MUST do it while saying the word!`},
 {t:"🔎 TREASURE HUNT", txt:(w,L)=>`Everyone point at the most <b>${w.en}</b>-ish thing in the room (or make its shape with your body), then say the word!`},
 {t:"📖 EXPERT MODE", txt:(w,L)=>`Grown-ups: say it the REAL way, then tell one tiny story about <b>${w.en}</b> from when YOU were little. Kids repeat the word!`}
];

/* ---------- CHAOS EVENTS ---------- */
const CHAOS = [

/* ---------- STATE & STORAGE ---------- */
let S = { lang:null, creatures:[], phrasebook:[], usedWords:[], missionsDone:0 };
let currentMission = null;
let pendingChaosMods = {};

async function loadState(){
  try{
    const r = await window.storage.get("tm3000");
    if(r && r.value){ S = Object.assign(S, JSON.parse(r.value)); }
  }catch(e){ /* first run — no save yet */ }
}
async function saveState(){
  try{ await window.storage.set("tm3000", JSON.stringify(S)); }catch(e){ console.error("save failed", e); }
}

function sessionLangKey(){
  if(S.lang==="mix") return Math.random()<0.5 ? "ko":"zh";
  return S.lang;
}
function updateHeader(){

/* ---------- AMBIENT SPARKLES ---------- */

  setInterval(()=>{
    if(document.querySelectorAll(".spark").length > 8) return;
    const s = document.createElement("div");
    s.className = "spark";

/* ---------- SPEECH ---------- */
let voices = [];
function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function speak(text, lang, opts={}){
  if(!window.speechSynthesis) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith(lang));
    if(v) u.voice = v;
    u.lang = lang==="ko"?"ko-KR": lang==="zh"?"zh-CN":"en-US";
    u.rate = opts.rate ?? 0.8; u.pitch = opts.pitch ?? 1;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- CONFETTI ---------- */
function confetti(n=50){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const bits = ["🎉","⭐","🎊","✨","💛","💗","💙"];
  for(let i=0;i<n;i++){
    const d = document.createElement("div");
    d.className="confetti"; d.textContent=rand(bits);
    d.style.left = Math.random()*100+"vw";
    d.style.animationDuration = (1.6+Math.random()*1.6)+"s";
    d.style.fontSize = (16+Math.random()*20)+"px";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), 3400);
  }
}

/* Hold-to-judge */
function setupHold(){
  const btn = $("#holdBtn"), fill = $("#holdFill");
  let raf=null, start=null;
  function begin(e){
    e.preventDefault();
    mood("think");
    start = performance.now();
    btn.querySelector(".holdlabel").textContent = "🎤 LISTENING... KEEP GOING!";
    function step(t){
      const p = Math.min((t-start)/2500, 1);
      fill.style.width = (p*100)+"%";
      if(p>=1){ done(); return; }
      raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
  }
  function cancel(){
    if(start===null) return;
    cancelAnimationFrame(raf); start=null;
    fill.style.width="0%"; mood("idle");
    btn.querySelector(".holdlabel").textContent = "🎤 HOLD & SAY IT TO THE MACHINE!";
  }
  function done(){
    cancelAnimationFrame(raf); start=null;
    btn.removeEventListener("pointerdown", begin);
    afterHold();
  }
  btn.addEventListener("pointerdown", begin);
  btn.addEventListener("pointerup", cancel);
  btn.addEventListener("pointerleave", cancel);
}

function afterHold(){
  stage().innerHTML = `
    <div class="bigemoji">🤖</div>
    <h2>JUDGING...</h2>
    <div class="bars"><i></i><i></i><i></i><i></i><i></i></div>
    <p>Analyzing silliness levels...</p>
  `;

}

/* ---------- CHAOS ---------- */
function runChaos(){
  const c = rand(CHAOS);
  mood("dizzy");
  if(c.countdown){
    overlay(`
      <div class="bigemoji">${c.e}</div>
      <h2>${c.t}</h2>
      <p>${c.txt}</p>
      <div class="countdown" id="cd">${c.countdown}</div>
    `, c.alarm);
    let n = c.countdown;
    if(c.id==="dance") speak("Dance emergency! Everybody dance!", "en", {rate:1.1, pitch:1.3});
    if(c.id==="freeze") speak("Freeze! Nobody move!", "en", {rate:1, pitch:0.6});
    const iv = setInterval(()=>{
      n--;
      const cd = document.getElementById("cd");
      if(cd) cd.textContent = n;
      if(n<=0){
        clearInterval(iv); closeOverlay(); confetti(30); showVerdict();
      }
    }, 1000);
  }
  else if(c.sneeze){
    overlay(`<div class="bigemoji">🤧</div><h2>${c.t}</h2><p>${c.txt}</p>`);
    setTimeout(()=>{
      document.body.classList.add("shake");
      speak("Ahh... ahh... CHOOO!", "en", {rate:0.9, pitch:0.7});
      overlay(`<div class="bigemoji">💥🤧💥</div><h2>AAACHOOO!!!</h2><p>The machine sneezed words EVERYWHERE!</p><button class="btn mint" id="bless">Say "BLESS YOU!" 🙏</button>`);
      confetti(60);
      setTimeout(()=>document.body.classList.remove("shake"), 600);
      document.getElementById("bless").addEventListener("click", ()=>{ closeOverlay(); showVerdict(); });
    }, 1600);
  }
  else if(c.robot){
    const L = LANGS[currentMission.langKey];
    overlay(`<div class="bigemoji">${c.e}</div><h2>${c.t}</h2><p>${c.txt}</p><button class="btn sky" id="sing">🎵 START THE SONG</button>`);
    document.getElementById("sing").addEventListener("click", ()=>{
      speak(L.native(currentMission.w)+"... "+L.native(currentMission.w)+"... "+L.native(currentMission.w), currentMission.langKey, {rate:0.5, pitch:0.4});
      document.getElementById("sing").outerHTML = `<button class="btn mint" id="sung">WE SANG IT! 🤖</button>`;
      document.getElementById("sung").addEventListener("click", ()=>{ closeOverlay(); showVerdict(); });
    });
  }
  else if(c.opposite){
    pendingChaosMods.opposite = true;
    overlay(`<div class="bigemoji">${c.e}</div><h2>${c.t}</h2><p>${c.txt}</p><button class="btn gold" id="uhoh">UH OH... 😬</button>`);
    document.getElementById("uhoh").addEventListener("click", ()=>{ closeOverlay(); showVerdict(); });
  }
  else { /* pirate */
    pendingChaosMods.pirate = true;
    overlay(`<div class="bigemoji">${c.e}</div><h2>${c.t}</h2><p>${c.txt}</p><button class="btn sky" id="arr">ARRR, FINE! 🏴‍☠️</button>`);
    document.getElementById("arr").addEventListener("click", ()=>{ closeOverlay(); showVerdict(); });
  }
}

/* ---------- VERDICT & HATCH ---------- */
function showVerdict(){
  mood("happy");
  const score = 71 + Math.floor(Math.random()*29);
  const rem = rand(REMAINDERS);
  let line = `The other ${100-score}% sounded like <b>${rem}</b>.`;
  let head = `${score}% PERFECT!`;
  if(pendingChaosMods.pirate){
    head = `${score}% PERFECT, MATEY!`;
    line = `Arrr! The other ${100-score}% sounded like ${rem} walkin' the plank!`;
  }
  if(pendingChaosMods.opposite){
    stage().innerHTML = `
      <div class="bigemoji">😱</div>
      <div class="score" style="background:linear-gradient(180deg,var(--coral),#D94A4A);-webkit-background-clip:text;background-clip:text;">2%</div>
      <h2>TERRIBLE!!</h2>
      <p>...wait. Wait wait wait. It's OPPOSITE DAY!</p>
      <button class="btn gold" id="flip">FLIP IT! 🙃</button>
    `;
    document.getElementById("flip").addEventListener("click", ()=>{
      pendingChaosMods.opposite = false;
      renderVerdictCard(head, line, score);
    });
    return;
  }
  renderVerdictCard(head, line, score);
}

function renderVerdictCard(head, line, score){
  mood("happy"); confetti(40);
  speak("Amazing!", "en", {rate:1, pitch:1.4});
  stage().innerHTML = `
    <div class="score">${score}%</div>
    <h2>${head}</h2>
    <p>${line}</p>
    <p style="font-size:14px;color:#9A8CC7;">The machine is VERY impressed with this party.</p>
    <button class="btn" id="hatch">🥚 A CREATURE EGG APPEARED!</button>

}

function showEgg(){

async function hatchCreature(){
  const w = currentMission.w;
  const creature = {
    e: rand(CRE),
    name: rand(ADJ)+" "+rand(NOUN),
    word: w.en,
    ts: Date.now()
  };
  S.creatures.push(creature);
  S.missionsDone++;
  if(!S.phrasebook.some(p=>p.id===w.id)){
    S.phrasebook.push({id:w.id, en:w.en, e:w.e, ko:w.ko, kr:w.kr, zh:w.zh, zp:w.zp});
  }
  await saveState();
  updateHeader();
  confetti(70);
  overlay(`
    <div class="tag">✦ NEW FRIEND ✦</div>
    <div class="bigemoji" style="font-size:82px">${creature.e}</div>
    <h2>${creature.name}!</h2>
    <p>joined your family collection!<br>New word saved to the Family Phrasebook: <b>${esc(w.en)}</b> ${w.e}</p>
    <button class="btn mint" id="nextM">NEXT QUEST! 🗺️</button>
    <button class="btn small sky" id="doneM">We're done for now</button>
  `);
  document.getElementById("nextM").addEventListener("click", ()=>{ closeOverlay(); startMission(); });
  document.getElementById("doneM").addEventListener("click", ()=>{ closeOverlay(); renderMissionHome(); });
}

   TRANSLATE (free play, AI powered)

function renderTranslate(){
  stage().innerHTML = `
    <div class="tag">✦ WORD KITCHEN ✦</div>
    <div class="bigemoji">🗣️</div>
    <h2>FEED ME WORDS!</h2>
    <p>Type anything. The machine will translate it...<br><i>probably.</i></p>
    <input type="text" id="phrase" maxlength="60" placeholder="like... stinky robot dance party">
    <button class="btn" id="goTranslate">FEED IT TO THE MACHINE! 🍽️</button>
  `;
  $("#goTranslate").addEventListener("click", doTranslate);
  $("#phrase").addEventListener("keydown", e=>{ if(e.key==="Enter") doTranslate(); });
}

async function doTranslate(){
  const phrase = $("#phrase").value.trim();
  if(!phrase) return;
  mood("think");
  stage().innerHTML = `<div class="bigemoji">🔮</div><h2>CRUNCHING WORDS...</h2><div class="bars"><i></i><i></i><i></i><i></i><i></i></div>`;

  if(Math.random()<0.22){
    setTimeout(()=>translateGlitch(phrase), 1200);
    return;
  }
  runRealTranslate(phrase);
}

function translateGlitch(phrase){
  mood("dizzy");
  const glitches = [
    {e:"🏴‍☠️", t:"PIRATE MODE!", out:`"ARRR, ye scurvy ${esc(phrase)}, shiver me timbers!"`},
    {e:"👶", t:"BABY MODE!", out:`"goo goo ba-ba ${esc(phrase.split(" ")[0]||"goo")} ga-ga!"`},
    {e:"🤖", t:"ROBOT MODE!", out:`"BEEP. BOOP. ${esc(phrase.toUpperCase())}. DOES. NOT. COMPUTE. BZZT."`},
    {e:"🐔", t:"CHICKEN MODE!", out:`"Bok bok BOK bok-bok baGAWK!"`}
  ];
  const g = rand(glitches);
  stage().innerHTML = `
    <div class="tag">⚠️ GLITCH DETECTED</div>
    <div class="bigemoji">${g.e}</div>
    <h2>${g.t}</h2>
    <p style="font-size:20px">${g.out}</p>
    <p class="gloss">that's... not right.</p>
    <button class="btn gold" id="bonk">🔨 BONK THE MACHINE TO FIX IT!</button>
  `;
  document.getElementById("bonk").addEventListener("click", ()=>{
    document.body.classList.add("shake");
    speak("Ouch! Okay okay, fixing it!", "en", {rate:1.1, pitch:1.3});
    setTimeout(()=>document.body.classList.remove("shake"), 600);
    stage().innerHTML = `<div class="bigemoji">😵‍💫</div><h2>OW! OKAY, FIXING...</h2><div class="bars"><i></i><i></i><i></i><i></i><i></i></div>`;
    runRealTranslate(phrase);
  });
}

async function runRealTranslate(phrase){
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{role:"user", content:
`You are the translator inside a silly kids' game for a pre-K and 2nd grade child playing with their Korean and Chinese grandparents. Translate this phrase into Korean and Mandarin Chinese: "${phrase.replace(/"/g,"'")}"

Rules:
- Keep it natural and simple, the way you'd say it to a child.
- If the phrase is not appropriate for young kids, respond with exactly {"error":"silly"}
- Respond ONLY with JSON, no markdown, no backticks, in this exact shape:
{"ko":{"text":"한국어","roman":"simple romanization with hyphens"},"zh":{"text":"中文","pinyin":"pinyin with tones"},"en":"the original phrase cleaned up"}`
        }]
      })
    });
    const data = await response.json();
    const text = (data.content||[]).map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
    const j = JSON.parse(text);
    if(j.error) return showTooSilly(phrase);
    showTranslation(j);
  }catch(err){
    console.error(err);
    showTooSilly(phrase, true);
  }
}

function showTooSilly(phrase, broken=false){
  mood("dizzy");
  stage().innerHTML = `
    <div class="bigemoji">${broken?"🔌":"🤯"}</div>
    <h2>${broken?"ERROR 500: BRAIN UNPLUGGED":"ERROR 404: TOO SILLY!"}</h2>
    <p>${broken?"The machine's brain wiggled loose! Check the internet and try again.":"That phrase broke the silliness meter! Try different words!"}</p>
    <button class="btn gold" id="again">TRY AGAIN</button>
  `;
  document.getElementById("again").addEventListener("click", renderTranslate);
}

function showTranslation(j){
  mood("happy");
  stage().innerHTML = `
    <div class="tag">✅ TRANSLATED!</div>
    <div class="gloss">"${esc(j.en||"")}"</div>
    <div class="native">${esc(j.ko?.text||"")}</div>
    <div class="roman">"${esc(j.ko?.roman||"")}"</div>
    <button class="speak" id="sayKo">🔊 🇰🇷</button>
    <div class="native" style="font-size:34px">${esc(j.zh?.text||"")}</div>
    <div class="roman">"${esc(j.zh?.pinyin||"")}"</div>
    <button class="speak" id="sayZh">🔊 🇨🇳</button>
    <div class="btnrow">
      <button class="btn small mint" id="savePB">📖 Save to Phrasebook</button>
      <button class="btn small gold" id="anotherT">Another!</button>
    </div>
  `;
  $("#sayKo").addEventListener("click", ()=>speak(j.ko?.text||"", "ko"));
  $("#sayZh").addEventListener("click", ()=>speak(j.zh?.text||"", "zh"));
  $("#anotherT").addEventListener("click", renderTranslate);
  $("#savePB").addEventListener("click", async function(){
    S.phrasebook.push({id:"c"+Date.now(), en:j.en, e:"⭐", ko:j.ko?.text||"", kr:j.ko?.roman||"", zh:j.zh?.text||"", zp:j.zh?.pinyin||""});
    await saveState();
    this.textContent = "✅ Saved!";
    confetti(20);
  });
}

          </div>
          <button class="speak" data-i="${i}" data-l="ko">🔊🇰🇷</button>
          <button class="speak" data-i="${i}" data-l="zh">🔊🇨🇳</button>
        </div>`).join("")
    : `<p class="gloss">Words you learn get saved here — your family's phrasebook for the whole trip! 📖</p>`;

  stage().innerHTML = `
    <div class="tag">✦ FAMILY COLLECTION ✦</div>
    <p class="gloss">${lvl+1>=TITLES.length && (S.creatures.length%3===0) ? "MAX LEVEL MACHINE!" : toNext+" more creature"+(toNext>1?"s":"")+" until the machine LEVELS UP!"}</p>
    <div class="meter"><i style="width:${pct}%"></i></div>
    ${creatures}
    <div class="divider">✦ ─ ✦ ─ ✦</div>
    <h2 style="margin:0">📖 FAMILY PHRASEBOOK</h2>
    <div style="display:flex;flex-direction:column;gap:8px;width:100%;">${pb}</div>
  `;
  stage().querySelectorAll(".speak").forEach(b=>{
    b.addEventListener("click", ()=>{
      const p = S.phrasebook[+b.dataset.i];
      if(!p) return;
      speak(b.dataset.l==="ko"?p.ko:p.zh, b.dataset.l);
    });
  });
}

/* =====================================================
   SETUP & BOOT
   ===================================================== */
function showSetup(){
  overlay(`
    <div class="bigemoji">🤖</div>
    <h2>HELLO, ADVENTURERS!</h2>
    <p>I am the Translation Machine 3000!<br><b>Which grandparents are on the quest today?</b></p>
    <div class="langpick">
      <button class="btn sky" data-l="ko">🇰🇷 Korean team!</button>
      <button class="btn" data-l="zh">🇨🇳 Chinese team!</button>
      <button class="btn mint" data-l="mix">🌏 Surprise us — mix it up!</button>
    </div>
  `);
  document.querySelectorAll(".langpick .btn").forEach(b=>{
    b.addEventListener("click", async ()=>{
      S.lang = b.dataset.l;
      await saveState();
      updateHeader();
      closeOverlay();
      confetti(30);
      renderMissionHome();
    });
  });
}

$("#langChip").addEventListener("click", showSetup);

(async function boot(){
  await loadState();
  updateHeader();
  ambientSparkles();
  if(!S.lang){ showSetup(); }
  else renderMissionHome();
})();
</script>
</body>
</html>
